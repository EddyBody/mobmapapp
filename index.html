<!DOCTYPE html>
<html>
<head>
    <title>Kart App</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />

    <style>
        body { margin: 0; }
        #map { height: 100vh; width: 100%; }
       button {
   		 position: absolute;
   		 top: 100px;   /* flyttet ned */
    		 left: 10px;
    		 z-index: 1000;
    		 padding: 10px;
		}
    </style>
</head>
<body>

<button onclick="getLocation()">Finn meg</button>
<button onclick="takePhoto()" style="top: 140px;">Ta bilde</button>

<div id="map"></div>

<input type="file" accept="image/*" capture="environment" id="cameraInput" style="display:none" />

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
    var map = L.map('map').setView([58.97, 5.73], 13);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; OpenStreetMap contributors'
    }).addTo(map);

    var marker;
    var currentPosition = null;

    function getLocation() {
        navigator.geolocation.getCurrentPosition(function(pos) {
            currentPosition = pos.coords;

            if (marker) map.removeLayer(marker);

            marker = L.marker([pos.coords.latitude, pos.coords.longitude]).addTo(map)
                .bindPopup("Du er her!")
                .openPopup();

            map.setView([pos.coords.latitude, pos.coords.longitude], 16);
        });
    }

    function takePhoto() {
        document.getElementById('cameraInput').click();
    }

    document.getElementById('cameraInput').addEventListener('change', function(event) {
        var file = event.target.files[0];
        if (!file || !currentPosition) {
            alert("Du må finne posisjon først!");
            return;
        }

        var reader = new FileReader();

        reader.onload = function(e) {
            var imageUrl = e.target.result;

            var lat = currentPosition.latitude;
            var lon = currentPosition.longitude;

            var imgMarker = L.marker([lat, lon]).addTo(map);

            imgMarker.bindPopup(`
                <b>Bilde tatt her</b><br>
                <img src="${imageUrl}" width="150">
            `);
        };

        reader.readAsDataURL(file);
    });
</script>

</body>
</html>
