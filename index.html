<!DOCTYPE html>
<html>
<head>
    <title>Kart App V5 FIX</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Leaflet -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />

    <style>
        body { margin: 0; }

        #map {
            height: 100vh;
            width: 100%;
        }

        .btn {
            position: absolute;
            left: 10px;
            z-index: 1000;
            padding: 10px;
            background: white;
            border: 1px solid #ccc;
            border-radius: 6px;
        }

        #locBtn { top: 100px; }

        /* Viktig: synlig fil-input (mobil stabilitet) */
        #cameraInput {
            top: 160px;
        }
    </style>
</head>
<body>

<button id="locBtn" class="btn">Finn meg</button>

<!-- Kamera / bilde (må være synlig for mobil stabilitet) -->
<input type="file" accept="image/*" id="cameraInput" class="btn" />

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
window.onload = function() {

    const map = L.map('map').setView([58.97, 5.73], 13);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; OpenStreetMap contributors'
    }).addTo(map);

    let currentPosition = null;
    let userMarker = null;

    // 📍 GPS
    document.getElementById("locBtn").addEventListener("click", function() {

        navigator.geolocation.getCurrentPosition(
            function(pos) {

                const lat = pos.coords.latitude;
                const lon = pos.coords.longitude;

                currentPosition = { latitude: lat, longitude: lon };

                if (userMarker) {
                    map.removeLayer(userMarker);
                }

                userMarker = L.marker([lat, lon]).addTo(map)
                    .bindPopup("Du er her!");

                map.setView([lat, lon], 16);

                setTimeout(() => userMarker.openPopup(), 200);
            },
            function(err) {
                alert("GPS feil: " + err.message);
            },
            {
                enableHighAccuracy: true,
                timeout: 10000
            }
        );
    });

    // 📷 Kamera / bilde (FIXED stabil versjon)
    document.getElementById("cameraInput").addEventListener("change", function(event) {

        const file = event.target.files && event.target.files[0];

        if (!file) {
            alert("Ingen fil valgt");
            return;
        }

        if (!currentPosition) {
            alert("Trykk 'Finn meg' først!");
            return;
        }

        // 🔥 viktig for mobilkamera stabilitet
        setTimeout(() => {

            const reader = new FileReader();

            reader.onload = function(e) {

                const imageUrl = e.target.result;

                const lat = currentPosition.latitude;
                const lon = currentPosition.longitude;

                const marker = L.marker([lat, lon]).addTo(map);

                marker.bindPopup(
                    "<b>Bilde tatt her</b><br><img src='" + imageUrl + "' width='180'>"
                );

                map.setView([lat, lon], 16);

                setTimeout(() => {
                    marker.openPopup();
                }, 150);
            };

            reader.onerror = function() {
                alert("Kunne ikke lese bilde");
            };

            reader.readAsDataURL(file);

        }, 300);
    });

};
</script>

</body>
</html>
